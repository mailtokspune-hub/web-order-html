  <script>
    window.addEventListener('load', async () => {
      const imgs = document.querySelectorAll('img[src$=".svg"]');
      for (const img of imgs) {
        try {
          const src = img.getAttribute('src');
          if (!src) continue;
          const url = new URL(src, location.href);
          if (url.origin !== location.origin && !src.startsWith('/')) continue;
          const res = await fetch(url.href);
          if (!res.ok) continue;
          const text = await res.text();
          const doc = new DOMParser().parseFromString(text, 'image/svg+xml');
          const svg = doc.querySelector('svg');
          if (!svg) continue;
          svg.classList.add(...img.classList);
          Object.entries(img.dataset).forEach(([key, value]) => {
            svg.dataset[key] = value;
          });
          if (img.width) svg.setAttribute('width', img.width);
          if (img.height) svg.setAttribute('height', img.height);
          img.replaceWith(svg);
        } catch (e) {
          console.warn('SVG inline failed:', img, e);
        }
      }
    });
  </script>
</head>
